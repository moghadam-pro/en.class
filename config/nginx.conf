# /etc/nginx/sites-available/en.class.sayid.ir

server {
    listen 80;
    listen [::]:80;
    server_name en.class.sayid.ir;

    # Redirect to HTTPS
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name en.class.sayid.ir;

    # ── SSL (Certbot manages these) ──────────────────────────────────────
    ssl_certificate     /etc/letsencrypt/live/en.class.sayid.ir/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/en.class.sayid.ir/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;
    ssl_session_cache   shared:SSL:10m;
    ssl_session_timeout 1d;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

    # ── Root ─────────────────────────────────────────────────────────────
    root /var/www/free-discussion-class/public;
    index index.php;
    charset utf-8;

    # ── Security headers ─────────────────────────────────────────────────
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "geolocation=(), microphone=(), camera=()" always;
    add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline' https://unpkg.com https://www.googletagmanager.com; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com; img-src 'self' data: https:; connect-src 'self'" always;

    # ── Logs ──────────────────────────────────────────────────────────────
    access_log /var/log/nginx/en.class.sayid.ir.access.log;
    error_log  /var/log/nginx/en.class.sayid.ir.error.log;

    # ── Gzip ──────────────────────────────────────────────────────────────
    gzip on;
    gzip_vary on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml image/svg+xml;
    gzip_min_length 1024;

    # ── Static assets — long cache ──────────────────────────────────────
    location ~* \.(css|js|png|jpg|jpeg|gif|svg|ico|woff|woff2|ttf)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    # ── Service Worker — no cache ────────────────────────────────────────
    location = /sw.js {
        expires -1;
        add_header Cache-Control "no-cache, no-store, must-revalidate";
    }

    # ── Manifest ──────────────────────────────────────────────────────────
    location = /manifest.json {
        expires 1d;
        add_header Cache-Control "public";
    }

    # ── Block access to sensitive dirs ──────────────────────────────────
    location ~ ^/(data|src|config|bootstrap|vendor|logs|uploads|scripts)/ {
        deny all;
        return 404;
    }
    location ~ /\. { deny all; }
    location ~ \.php$ {
        # Only allow index.php
        if ($request_uri !~ "^/index\.php") { return 404; }
    }

    # ── Sitemap ────────────────────────────────────────────────────────
    location = /sitemap.xml {
        try_files $uri /index.php?$query_string;
    }

    # ── All requests → index.php ─────────────────────────────────────────
    location / {
        try_files $uri $uri/ /index.php?$query_string;
    }

    # ── PHP-FPM ──────────────────────────────────────────────────────────
    location = /index.php {
        fastcgi_pass   unix:/var/run/php/php8.3-fpm.sock;
        fastcgi_index  index.php;
        fastcgi_param  SCRIPT_FILENAME $realpath_root$fastcgi_script_name;
        include        fastcgi_params;

        fastcgi_param  APP_ENV production;
        fastcgi_param  TELEGRAM_BOT_TOKEN    $TELEGRAM_BOT_TOKEN;
        fastcgi_param  TELEGRAM_ADMIN_IDS    $TELEGRAM_ADMIN_IDS;
        fastcgi_param  TELEGRAM_WEBHOOK_SECRET $TELEGRAM_WEBHOOK_SECRET;
        fastcgi_param  GA_ID                 $GA_ID;

        fastcgi_read_timeout 120;
        fastcgi_buffer_size  128k;
        fastcgi_buffers      4 256k;
    }

    # ── File upload limit (for bot) ──────────────────────────────────────
    client_max_body_size 20M;
}
